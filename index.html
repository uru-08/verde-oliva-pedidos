* {

    margin: 0;

    padding: 0;

}


body {

    font-family: 'Montserrat', sans-serif;

    background:

    color: #263c29;

    min-height: 100vh;

}

header {

    box-shadow:

    position: relative;

    overflow: hidden;

}


header::before {

    content: "";

    position: absolute;

    width: 180px;

    height: 180px;

    background: rgba(255,255,255,0.12);

    border-radius: 50%;

    top: -80px;

    left: -50px;

}


header::after {

    content: "";

    position: absolute;

    width: 220px;

    height: 220px;

    background: rgba(255,193,7,0.16);

    border-radius: 50%;

    bottom: -140px;

    right: -50px;

}

    z-index: 2;

}

===================================================== */

.boton {

    font-family: 'Montserrat', sans-serif;

    font-size: 15px;

    font-weight: 800;

    cursor: pointer;

    box-shadow:

        0 4px 10px
        rgba(67,160,71,0.35);

    transition: all 0.2s;

}


.boton:hover {

    transform: scale(1.04);

}


.boton:active {

    transform: scale(0.96);

}
